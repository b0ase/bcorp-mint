<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="blood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="50%" stop-color="#ff0040"/>
      <stop offset="100%" stop-color="#cc0033"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" font-family="'Helvetica Neue', 'Arial Black', Impact, sans-serif" font-size="220" font-weight="900" letter-spacing="30" fill="url(#blood)" filter="url(#glow)">NPGX</text>
</svg>
