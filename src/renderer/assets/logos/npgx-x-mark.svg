<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="xg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="50%" stop-color="#ff0040"/>
      <stop offset="100%" stop-color="#990026"/>
    </linearGradient>
    <filter id="xglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Big X -->
  <text x="300" y="340" text-anchor="middle" dominant-baseline="middle" font-family="'Helvetica Neue', 'Arial Black', Impact, sans-serif" font-size="500" font-weight="900" fill="url(#xg)" filter="url(#xglow)" opacity="0.9">X</text>
  <!-- NPG text across the X -->
  <text x="300" y="280" text-anchor="middle" dominant-baseline="middle" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-size="100" font-weight="900" letter-spacing="20" fill="#ffffff">NPG</text>
  <!-- Small subtitle -->
  <text x="300" y="420" text-anchor="middle" dominant-baseline="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" letter-spacing="14" fill="#ff3366" opacity="0.8">CERTIFIED</text>
</svg>
